<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mail Subscription Manager</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>📧 Subscription Manager</h1>
      <p class="subtitle">Manage your email subscriptions</p>
    </header>

    <div id="auth-section" class="auth-section" style="display: none;">
      <div class="auth-tabs">
        <button id="login-tab" class="auth-tab active">Login</button>
        <button id="register-tab" class="auth-tab">Register</button>
      </div>
      
      <form id="login-form" class="auth-form">
        <input type="email" id="login-email" placeholder="Email" required>
        <input type="password" id="login-password" placeholder="Password" required>
        <button type="submit" class="btn-primary">Login</button>
        <div class="auth-error" style="display: none;"></div>
      </form>

      <form id="register-form" class="auth-form" style="display: none;">
        <input type="email" id="register-email" placeholder="Email" required>
        <input type="password" id="register-password" placeholder="Password (min 6 chars)" required>
        <button type="submit" class="btn-primary">Register</button>
        <div class="auth-error" style="display: none;"></div>
      </form>
    </div>

    <div id="user-section" class="user-section" style="display: none;">
      <div class="user-info">
        <span id="user-email" class="user-email"></span>
        <button id="logout-btn" class="btn-logout">Logout</button>
      </div>
      <div class="stats-bar">
        <div class="stat">
          <span class="stat-label">Emails Scanned:</span>
          <span id="emails-scanned" class="stat-value">0</span>
        </div>
        <div class="stat">
          <span class="stat-label">Subscriptions:</span>
          <span id="total-subs" class="stat-value">0</span>
        </div>
      </div>
    </div>

    <div class="scan-section">
      <button id="scan-btn" class="btn-primary">
        <span class="btn-text">Scan Inbox</span>
        <span class="btn-loader" style="display: none;">⏳ Scanning...</span>
      </button>
      <div id="scan-info" class="scan-info" aria-live="polite" aria-atomic="true" role="status"></div>
    </div>

    <div id="results-section" class="results-section" style="display: none;">
      <div class="results-header">
        <h2>Found <span id="sub-count">0</span> Subscriptions</h2>
      </div>
      <div id="sub-list" class="sub-list"></div>
    </div>

    <div id="empty-state" class="empty-state">
      <p>� Please login or register to scan your inbox</p>
    </div>

    <div id="error-state" class="error-state" style="display: none;">
      <p class="error-message"></p>
      <button id="retry-btn" class="btn-secondary">Try Again</button>
    </div>
  </div>

  <script src="popup.js" type="module"></script>
</body>
</html>
